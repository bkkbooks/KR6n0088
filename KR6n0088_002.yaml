body:
  text: 後魏中印度三藏勒那摩提譯佛寶品第二佛體無前際及無中間際亦復無後際寂靜自覺知既自覺知已為欲令他知是故為彼説無畏常恆道佛能執持彼智慧慈悲刀及妙金剛杵割截諸苦芽摧碎諸見山覆藏顛倒意及一切稠林故我今敬禮此偈示現何義偈言無為體自然不依他而知智悲及以力自他利具足此偈略明佛寶所攝八種功德何等為八一者無為體二者自然三者不依他知四者智五者悲六者力七者自利益八者他利益偈言非初非中後自性無為體及法體寂靜故自然應知唯內身自證故不依他知如是三覺知慈心為説道智悲及力等拔苦煩惱刺初三句自利後三句利他此偈明何義遠離有為名為無為應知又有為者生住滅法無彼有為是故佛體非初中後故得名為無為法身應知偈言佛體無前際及無中間際亦復無後際故又復遠離一切戲論虛妄分別寂靜體故名為自然應知偈言寂靜故不依他知者不依他因緣證知故不依他因緣證知者不依他因緣生故不依他因緣生者自覺不依他覺故如是依於如來無為法身相故一切佛事無始世來自然而行常不休息如是希有不可思議諸佛境界不從他聞不從他聞者不從師聞自自在智無言之體而自覺知偈言自覺知故既自覺知已然後為他生盲衆生令得覺知為彼證得無為法身説無上道是故名為無上智悲應知偈言既自覺知已為欲令他知是故為彼説無畏常恆道故無畏常恆道者明道無畏是常是恆以出世間不退轉法如是次第又拔他苦煩惱根本如來智慧慈悲及神力如是三句刀金剛杵譬喻示現又以何者為苦根本略説言之謂三有中生名色是又何者為煩惱根本謂身見等虛妄邪見疑戒取等又名色者是彼所攝所生苦芽應知如來智慧慈悲心等能割彼芽以是義故説刀譬喻偈言佛能執持彼智慧慈悲刀故割截諸苦芽故又邪見疑所攝煩惱見道遠離以世間智所不能知稠林煩惱不能破壞如世間中樹林牆等彼相似法以如來力能破壞彼以是故説金剛杵喻偈言及妙金剛杵故摧碎諸見山覆藏顛倒意及一切稠林故此六種句如來莊嚴智慧光明入一切佛境界經中次第顯説應知應云何知彼經中言文殊師利如來應正遍知不生不滅者此明如來無為之相又復次説無垢清淨琉璃地中帝釋王身鏡像現等如是乃至九種譬喻皆明如來不生不滅又言文殊師利如來應正遍知清淨法身亦復如是不動不生心不戲論不分別不分別無分別不思無思不思議無念寂滅寂靜不生不滅不可見不可聞不可嗅不可嘗不可觸無諸相不可覺不可知如是等句皆説寂靜差別之相此明何義明佛一切所作事中遠離一切戲論分別寂靜自然次説餘殘修多羅彼中説言如實覺知一切法門者此明如來不依他故證大菩提又復次説如來菩提有十六種是故經言文殊師利如來如是如實覺知一切諸法觀察一切衆生法性不淨有垢有點奮迅於諸衆生大悲現前此明如來無上智悲應知文殊師利如來如是如實覺知一切法者如向前説無體為體如實覺知者如實無分別佛智知故觀察一切衆生法性者乃至邪聚衆生如我身中法性法體法界如來藏等彼諸衆生亦復如是無有差別如來智眼了了知故不淨者以諸凡夫煩惱障故有垢者以諸聲聞辟支佛等有智障故有點者以諸菩薩摩訶薩等依彼二種習氣障故奮迅者能如實知種種衆生可化方便入彼衆生可化方便種種門故大悲者成大菩提得於一切衆生平等大慈悲心為欲令彼一切衆生如佛證智如是覺知證大菩提故次於一切衆生平等轉大法輪常不休息如是三句能作他利益故名為力應知又此六句次第初三種句謂無為等功德如來法身相應示現自利益餘三種句所謂智等示現他利益又復有義以有智慧故證得第一寂靜法身是故名為自利益又依慈悲力等二句轉大法輪示現他利益已説佛寶次明法寶究竟一乘寶性論法寶品第三論曰依彼佛寶有真法寶以是義故次佛寶後示現法寶依彼法寶故説四偈非有亦非無亦復非有無亦非即於彼亦復不離彼不可得思量非聞慧境界出離言語道內心知清涼彼真妙法日清淨無塵垢大智慧光明普照諸世間能破諸曀障覺觀貪瞋癡一切煩惱等故我今敬禮此偈示現何義偈言不思議不二無分淨現對依何得何法離法二諦相此偈略明法寶所攝八種功德何等為八一者不可思議二者不二三者無分別四者淨五者顯現六者對治七者離果八者離因離者偈言滅諦道諦等二諦攝取離彼各三功德次第説應知此偈明何義前六功德中初三種功德不思議不二及無分別等示現彼滅諦攝取離煩惱應知餘殘有三句淨顯現對治示現彼道諦攝取斷煩惱因應知又證法所有離名為滅諦以何等法修行斷煩惱名為道諦以此二諦合為淨法以二諦相名為離法應知偈言不思量無言智者內智知以如是義故不可得思議清涼不二法及無分別法淨顯現對治三句猶如日此偈明何義略明滅諦有三種法以是義故不可思議應知以何義故不可思議有四義故何等為四一者為無二者為有三者為有無四者為二偈言非有亦非無亦復非有無亦非即於彼亦復不離彼故滅諦有三種法應知者此明何義滅諦非可知有三種法何等為三一者非思量境界故偈言不可得思量非聞慧境界故二者遠離一切聲響名字章句言語相貌故偈言出離言語道故三者聖人內證法故偈言內心知故又滅諦云何不二法者及云何無分別者如不增不減經中如來説言舍利弗如來法身清涼以不二法故以無分別法故偈言清涼故何者是二而説不二所言二者謂業煩惱言分別者所謂集起業煩惱因及邪念等以知彼自性本來寂滅不二無二行知苦本來不生是名苦滅諦非滅法故名苦滅諦是故經言文殊師利何等法中無心意意識行彼法中無分別以無分別故不起邪念以有正念故不起無明以不起無明故即不起十二有支以不起十二有支故即名無生是故聖者勝鬘經言世尊非滅法故名苦滅諦世尊所言苦滅者名無始無作無起無盡離盡常恆清涼不變自性清淨離一切煩惱藏所纏世尊過於恆沙不離不脫不異不思議佛法畢竟成就説如來法身世尊如是如來法身不離煩惱藏所纏名如來藏如是等勝鬘經中廣説滅諦應知又以何因得此滅諦如來法身謂於見道及修道中無分別智三種日相似相對法應知偈言彼真妙法日故何等為三一者日輪清淨相似相對法以遠離一切煩惱垢故偈言清淨無塵垢故二者顯現一切色像相似相對法以一切種一切智能照知故偈言大智慧光明故三者對治暗相似相對法以起一切種智對治法故偈言普照諸世間故又以何者是所治法所謂依取不實事相虛妄分別念生貪瞋癡結使煩惱此明何義愚癡凡夫依結使煩惱取不實事相念故起於貪心依瞋恚故起於瞋心依於無明虛妄念故起於癡心又復依彼貪瞋癡等虛妄分別取不實事相念起邪念心依邪念心起於結使依於結使起貪瞋癡以是義故身口意等造作貪業瞋業癡業依此業故復有生生不斷不絶如是一切愚癡凡夫依結使煩惱集起邪念依邪念故起諸煩惱依煩惱故起一切業依業起生如是此一切種諸煩惱染業染生染愚癡凡夫不如實知不如實見一實性界如彼如實性觀察如實性而不取相以不取相故能見實性如是實性諸佛如來平等證知又不見如是虛妄法相如實知見如實有法真如法界以見第一義諦故如是二法不增不減是故名為平等證智是名一切種智所治障法應如是知以起真如智對治法故彼所治法畢竟不復生起現前偈言能破諸曀障覺觀貪瞋癡一切煩惱等故又此得滅諦如來法身因於見道中及修道中無分別智廣説如摩訶般若波羅蜜等修多羅中言須菩提真如如來真如平等無差別如是等應知已説法寶次説僧寶究竟一乘寶性論僧寶品第四論曰依大乘法寶有不退轉菩薩僧寶以是義故次法寶後示現僧寶依彼僧寶故説四偈正覺正知者見一切衆生清淨無有我寂靜真實際以能知於彼自性清淨心見煩惱無實故離諸煩惱無障淨智者如實見衆生自性清淨性佛法僧境界無閡淨智眼見諸衆生性遍無量境界故我今敬禮此偈示現何義偈言如實知內身以智見清淨故名無上僧諸佛如來説此偈明何義偈言如實見衆生寂靜真法身以見性本淨煩惱本來無此偈明何義以如實見本際以來我空法空應知偈言正覺正知者見一切衆生清淨無有我寂靜真實際故又彼如實知無始世來本際寂靜無我無法非滅煩惱證時始有此明何義此見自性清淨法身略説有二種法何等為二一者見性本來自性清淨二者見諸煩惱本來寂滅偈言以能知於彼自性清淨心見煩惱無實故離諸煩惱故又自性清淨心本來清淨又本來常為煩惱所染此二種法於彼無漏真如法界中善心不善心俱更無第三心如是義者難可覺知是故聖者勝鬘經言世尊剎尼迦善心非煩惱所染剎尼迦不善心亦非煩惱所染煩惱不觸心心不觸煩惱云何不觸法而能得染心世尊然有煩惱有煩惱染心自性清淨心而有染者難可了知如是等聖者勝鬘經中廣説自性清淨心及煩惱所染應知又有二種修行謂如實修行及遍修行難證知義如實修行者謂見衆生自性清淨佛性境界故偈言無障淨智者如實見衆生自性清淨性佛法身境界故遍修行者謂遍十地一切境界故見一切衆生有一切智故又遍一切境界者以遍一切境界依出世間慧見一切衆生乃至畜生有如來藏應知彼見一切衆生有真如佛性初地菩薩摩訶薩以遍證一切真如法界故偈言無閡淨智眼見諸衆生性遍無量境界故如是內身自覺知彼無漏法界無障無閡依於二法一者如實修行二者遍修行此明何義謂出世間如實內證真如法智不共二乘凡夫人等應知此明何義菩薩摩訶薩出世間清淨證智略説有二種勝聲聞辟支佛證智何等為二一者無障二者無礙無障者謂如實修行見諸衆生自性清淨境界故名無障無閡者謂遍修行以如實知無邊境界故名無閡此明何義偈言如實知見道見清淨佛智故不退聖人能作衆生依此偈明何義又依初地菩薩摩訶薩證智清淨見道不退地乘能作見彼無上菩提清淨勝因應知偈言如實知見道見清淨佛智故此初地證智勝餘菩薩摩訶薩布施持戒等波羅蜜功德以是義故菩薩摩訶薩依如實見真如證智是故能與一切衆生天龍八部聲聞辟支佛等作歸依處偈言不退聖人能作衆生依故問曰以何義故不明歸依聲聞僧寶答曰菩薩僧寶功德無量是故應供以應供故合應禮拜讚歎供養聲聞之人無如是義以是義故不明歸依聲聞僧寶此明何義偈言境界諸功德證智及涅槃諸地淨無垢滿足大慈悲生於如來家具足自在通果勝最無上是勝歸依義此偈明何義略説菩薩十種勝義過諸聲聞辟支佛故何等為十一者觀勝二者功德勝三者證智勝四者涅槃勝五者地勝六者清淨勝七者平等心勝八者生勝九者神力勝十者果勝觀勝者謂觀真如境界是名觀勝偈言境界故功德勝者菩薩修行無厭足不同二乘少欲等是名功德勝偈言功德故證智勝者證二種無我是名證智勝偈言證智故涅槃勝者教化衆生故是名涅槃勝偈言涅槃故地勝者所謂十地等是名地勝偈言諸地故清淨勝者菩薩遠離智障是名清淨勝偈言淨無垢故平等心勝者菩薩大悲遍覆是名平等心勝偈言滿足大慈悲故生勝者諸菩薩生無生故是名生勝偈言生於如來家故神力勝者謂三昧自在神通等力勝是名神力勝偈言具足三昧自在通故果勝者究竟無上菩提故是名果勝偈言果勝最無上故此明何義有黠慧人知諸菩薩功德無量修習菩提無量無邊廣大功德有大智慧慈悲圓滿為照知彼無量衆生性行稠林猶如初月唯除諸佛如來滿月菩薩摩訶薩知諸聲聞乃至證得阿羅漢道少智慧人無大悲心為照自身猶如星宿既如是知欲取如來大滿月身修菩提道而當棄捨初月菩薩起心禮拜供養其餘星宿聲聞辟支佛者無有是處此復何義明為利益一切衆生初始發起菩提之心諸菩薩等已能降伏不為利益他衆生身為自利益修持無漏清淨禁戒乃至證得阿羅漢果聲聞之人何況其餘得十自在等無量無邊功德菩薩摩訶薩而同聲聞辟支佛等少功德人無有是處以是義故經中偈言若為自身故修行於禁戒遠離大慈心捨破戒衆生以為自身故護持禁戒財如是持戒者佛説非清淨若為他人故修行於禁戒能利益衆生如地水火風以為他衆生起第一悲心是名淨持戒餘似非清淨問曰依何等義為何等人諸佛如來説此三寶答曰偈言依能調所證弟子為三乘信三供養等是故説三寶此偈明何義略説依三種義為六種人故説三寶何等為三一者調御師二者調御師法三者調御師弟子偈言依能調所證弟子故六種人者何等為六一者大乘二者中乘三者小乘四者信佛五者信法六者信僧偈言為三乘信三供養等故初釋第一義第一第四人歸依兩足中最勝第一尊佛示現調御師大丈夫義故偈言依能調故為取佛菩提諸菩薩人故偈言為大乘故為信供養諸佛如來福田人故偈言信佛供養故以是義故説立佛寶偈言是故説佛寶故已釋第一義第一第四人次釋第二義第二第五人歸依離煩惱中最勝第一法示現調御師所證功德法故偈言依所證故為自然知不依他知深因緣法辟支佛人故偈言為中乘故為信供養第一妙法福田人故偈言信法供養故以是義故説立法寶偈言是故説法寶故已釋第二義第二第五人次釋第三義第三第六人歸依諸衆中最勝第一諸菩薩僧示現調御師弟子於諸佛如來所説法中如實修行不相違義故偈言依弟子故為從他聞聲聞人故偈言為小乘故為信供養第一聖衆福田人故偈言信僧供養故以是義故説立僧寶偈言是故説僧寶故是名略説依三種義為六種人故諸佛如來説此三寶偈言依能調所證弟子為三乘信三供養等是故説三寶故又為可化衆生令次第入以是義故依於世諦示現明説立三歸依此明何義偈言可捨及虛妄無物及怖畏二種法及僧非究竟歸依此偈明何義法有二種何等為二一所説法二所證法所説法者謂如來説修多羅等名字章句身所攝故彼所説法證道時滅如捨船筏偈言可捨故所證法者復有二種謂依因果二種差別以依何法證何法故此明何義所謂有道有為相攝若為有為相所攝者彼法虛妄偈言及虛妄故若虛妄者彼法非實若非實者彼非真諦非真諦者即是無常若無常者非可歸依又復若依彼聲聞道所得滅諦彼亦無物猶如燈滅唯斷少分諸煩惱苦若如是者則是無物若無物者云何為他之所歸依偈言無物故僧者凡有三乘之人三乘人中依聲聞僧常有怖畏常求歸依諸佛如來求離世間此是學人所應作者未究竟故猶進趣向阿耨多羅三藐三菩提故所言怖畏者云何怖畏以阿羅漢雖盡有漏而不斷一切煩惱習氣彼於一切有為行相極怖畏心常現在前是故聖者勝鬘經言阿羅漢有恐怖何以故阿羅漢於一切無行怖畏想住如人執劍欲來害己是故阿羅漢無究竟樂何以故世尊依不求依如衆生無依彼彼恐怖以恐怖故則求歸依如是阿羅漢有怖畏以恐怖故歸依如來故彼若如是有怖畏者彼人畢竟為欲遠離彼怖畏處求無畏處以是義故依遠離彼怖畏之處名為學者當有所作欲得阿耨多羅三藐三菩提無畏之處是故聲聞法僧二寶是少分歸依非究竟歸依偈言二種法及僧非究竟歸依故此明何義偈言衆生歸一處佛法身彼岸依佛身有法依法究竟僧此偈明何義如向所説諸佛如來不生不滅寂靜不二離垢法身故以唯一法身究竟清淨處故又三乘之人無有救者無歸依者以唯有彼岸無始本際畢竟無盡是可歸依恆可歸依所謂唯是諸佛如來故如是常恆清涼不變故可歸依聖者勝鬘經中廣説應知問曰以何義故佛法衆僧説名為寶答曰偈言真寶世希有明淨及勢力能莊嚴世間最上不變等此偈明何義所言寶者有六種相似依彼六種相似相對法故佛法衆僧説名為寶何等為六一者世間難得相似相對法以無善根諸衆生等百千萬劫不能得故偈言真寶世希有故二者無垢相似相對法以離一切有漏法故偈言明淨故三者威德相似相對法以具足六通不可思議威德自在故偈言勢力故四者莊嚴世間相似相對法以能莊嚴出世間故偈言能莊嚴世間故五者勝妙相似相對法以出世間法故偈言最上故六者不可改異相似相對法以得無漏法世間八法不能動故偈言不變故問曰依何等法有此三寶而依此法得有世間及出世間清淨生起三寶答曰為彼義故説兩行偈真如有雜垢及遠離諸垢佛無量功德及佛所作業如是妙境界是諸佛所知依此妙法身出生於三寶此偈示現何義偈言如是三寶性唯諸佛境界以四法次第不可思議故此偈明何義真如有雜垢者謂真如佛性未離諸煩惱所纏如來藏故及遠離諸垢者即彼如來藏轉身到佛地得證法身名如來法身故佛無量功德者即彼轉身如來法身相中所有出世間十力無畏等一切諸功德無量無邊故及佛所作業者即彼十力等一切諸佛法自然常作無上佛業常不休息常不捨離常授諸菩薩記彼處次第有四種法不可思議是故名為如來境界何等四處偈言染淨相應處不染而清淨不相捨離法自然無分別此偈明何義真如有雜垢者同一時中有淨有染此處不可思議不可思議者信深因緣法聲聞辟支佛於彼非境界故是故聖者勝鬘經中佛告勝鬘言天女自性清淨心而有染污難可了知有二法難可了知謂自性清淨心難可了知彼心為煩惱所染亦難了知天女如此二法汝及成就大法菩薩摩訶薩乃能聽受諸餘聲聞辟支佛等唯依佛語信此二法故偈言染淨相應處故及遠離諸垢者真如非本有染後時言清淨此處不可思議是故經言心自性清淨自性清淨心本來清淨如彼心本體如來如是知是故經言如來一念心相應慧得阿耨多羅三藐三菩提故偈言不染而清淨故佛無量功德者謂前際後際於一向染凡夫地中常不捨離真如法身一切諸佛法無異無差別此處不可思議是故經言復次佛子如來智慧無處不至何以故以於一切衆生界中終無有一衆生身中而不具足如來功德及智慧者但衆生顛倒不知如來智遠離顛倒起一切智無師智無礙智佛子譬如有一極大經卷如一三千大千世界大千世界一切所有無不記録若與二千世界等者悉記二千世界中事若與小千世界等者悉記小千世界中事四天下等者悉記一切四天下事須彌山王等者悉記須彌山王等事地天宮等者悉記地天宮殿中事欲天宮等者悉記欲天宮殿中事色天宮等者悉記色天宮殿中事若與無色天宮等者悉記一切無色界天宮殿中事彼等三千大千世界極大經卷在一極細小微塵內一切微塵皆亦如是時有一人出興於世智慧聰達具足成就清淨天眼見此經卷在微塵內作如是念云何如此廣大經卷在微塵內而不饒益諸衆生耶我今應當勤作方便破彼微塵出此經卷饒益衆生作是念已爾時彼人即作方便破壞微塵出此經卷饒益衆生佛子如來智慧無相智慧無閡智慧具足在於衆生身中但愚癡衆生顛倒想覆不知不見不生信心爾時如來以無障閡清淨天眼觀察一切諸衆生身既觀察已作如是言奇哉奇哉云何如來具足智慧在於身中而不知見我當方便教彼衆生覺悟聖道悉令永離一切妄想顛倒垢縛令具足見如來智慧在其身內與佛無異如來即時教彼衆生修八聖道捨離一切虛妄顛倒離顛倒已見如來智與如來等饒益衆生故偈言不相捨離法故及佛所作業者同一時一切處一切時自然無分別隨順衆生心隨順可化衆生根性不錯不謬隨順作佛業此處不可思議是故經言善男子如來為令一切衆生入佛法中故無量如來業作有量説善男子如來所有實作業者於彼一切世間衆生不可量不可數不可思議不可知不可以名字説何以故以難可得與前衆生故以於一切諸佛國土不休息故以一切諸佛悉平等故以過一切諸世間心所作事故以無分別猶如虛空悉平等故以無異無差別法性體故如是等廣説已又説不淨大毗琉璃摩尼寶珠譬喻言善男子汝依此譬喻應知如來業不可思議故平等遍至故一切處不可呵故三世平等故不斷絶三寶種故諸佛如來雖如是住不可思議業中而不捨離虛空法身雖不捨離虛空法身而於衆生隨所應聞名字章句為之説法雖為衆生如是説法而常遠離一切衆生心所念觀何以故以如實知一切衆生諸心行故偈言自然無分別故依此妙法身出生於三寶者偈言所覺菩提法依菩提分知菩提分教化衆生覺菩提初句為正因餘三為淨緣前二自利益後二利益他此偈明何義此四種句總攝一切所知境界此明何義初一句者謂所證法應知以彼證法名為菩提偈言所覺菩提法故第二句菩提依菩提分知者以諸佛菩提功德能作佛菩提因故偈言依菩提分知故第三句菩提分教化者以菩提分令他覺故第四句衆生覺菩提者所化衆生覺菩提故此四種句次第不取相依此行故清淨菩提出生三寶應知偈言所覺菩提法依菩提分知菩提分教化衆生覺菩提故以一句因三句緣故如來得阿耨多羅三藐三菩提以得菩提者十力等諸佛如來法三十二種諸佛如來作業依如來業衆生聞聲依彼法故得清淨因緣出生三寶應知是故偈言初句為正因餘三為淨緣故
