body:
  text: 後魏中印度三藏勒那摩提譯無量煩惱所纏品第六論曰偈言向説如來藏十種義示現次説煩惱纏以九種譬喻此偈明何義向依如來藏説無始世界來彼法恆常住法體不轉變明如來藏有十種義自此以下依無始世界來煩惱藏所纏説無始世界來自性清淨心具足法身以九種譬喻明如來藏過於恆沙煩惱藏所纏如修多羅説應知九種譬喻者如偈説言萎華中諸佛衆蜂中美蜜皮糩等中實糞穢中真金地中珍寶藏諸果子中芽朽故弊壞衣纏裹真金像貧賤醜陋女懷轉輪聖王焦黑泥模中有上妙寶像衆生貪瞋癡妄想煩惱等塵勞諸垢中皆有如來藏此偈示現何義自此以下依此略説四偈句義餘殘譬喻五十四偈廣説應知此四行偈總略説彼廣偈中義應知又依彼義略説二偈華蜂糩糞穢地果故壞衣貧賤女泥模煩惱垢相似佛蜜實真金寶牙金像王上妙寶像等如來藏相似此偈示現何義偈言華蜂等諸喻明衆生身中無始世界來有諸煩惱垢佛蜜等諸喻明衆生身中無始來具足自性無垢體又復略説此如來藏修多羅中明一切衆生界從無始世界來客塵煩惱染心從無始世界來淨妙法身如來藏不相捨離是故經言依自虛妄染心衆生染依自性清淨心衆生淨云何自心染依自心染有九種喻謂萎華等應知偈言貪瞋癡相續及結使熏集見修道不淨及淨地有垢萎華等諸喻説九種相對無邊煩惱纏故説差別相此偈明何義略説有九種煩惱於自性清淨如來法身界中如萎華等九種譬喻於諸佛等常外客相諸煩惱垢亦復如是於真如佛性常客塵相何等以為九種煩惱一者貪使煩惱二者瞋使煩惱三者癡使煩惱四者增上貪瞋癡結使煩惱五者無明住地所攝煩惱六者見道所斷煩惱七者修道所斷煩惱八者不淨地所攝煩惱九者淨地所攝煩惱此如是等九種煩惱以彼九種譬喻示現應知此明何義世間貪等衆生身中所攝煩惱能作不動地業行緣成就色界無色界果報出世間智能斷名為貪瞋癡使煩惱偈言貪瞋癡相續故又增上貪瞋癡衆生身中所攝煩惱能作福業罪業行緣但能成就欲界果報唯有不淨觀智能斷名為增上貪瞋癡等結使煩惱偈言及結使故又阿羅漢身中所攝煩惱能作無漏諸業行緣能生無垢意生身果報唯如來菩提智能斷名為無明住地所攝煩惱偈言熏集故又有二種學人何等為二一者凡夫二者聖人凡夫身中所攝煩惱初出世間心見出世間法智能斷名為見道所斷煩惱偈言見道故聖人身中所攝煩惱如先見出世間法修道智能斷名為修道所斷煩惱偈言修道故又不究竟菩薩謂從初地乃至七地所攝煩惱七住地中所對治法八地已上三住地中修道智能斷名為不淨地所攝煩惱偈言不淨故又畢竟究竟菩薩身中所攝煩惱八地已上三地修道智所對治法金剛三昧智能斷名為淨地所攝煩惱偈言及淨地有垢故是名略説九種煩惱次第萎華等九種譬喻我已廣説應知又復即此九種煩惱依八萬四千衆生行故有八萬四千煩惱差別如如來智無量無邊故有如是無量無邊煩惱纏如來藏故言無量煩惱藏所纏如來藏是故偈言愚癡及羅漢諸學及大智次第四種垢及一二復二如是次第説四凡一聖人二學二大智名為不淨地此偈明何義此九種譬喻於無漏界中如是次第四種譬喻及第五譬喻後時二二煩惱諸垢依煩惱垢染故言不清淨又復云何知此九種貪等煩惱於萎華等九種譬喻相似相對又云何知如來藏於諸佛等九種譬喻相似相對偈言依佛神力故有彼衆妙華初榮時則愛後萎變不愛如華依榮悴有愛有不愛貪煩惱亦爾初樂後不樂群蜂為成蜜瞋心嚙諸花瞋恚心起時生種種苦惱稻等內堅實外為皮糩覆如是癡心纏不見內堅實猶如臭穢糞智觀貪亦爾起欲心諸相結使如穢糞譬如彼地中種種珍寶藏衆生無天眼是故不能見如是自在智為無明地覆衆生無智眼是故不能見如子離皮糩次第生芽等見道斷煩惱次第生諸地以害身見等攝取妙聖道修道斷煩惱故説弊壞衣七地中諸垢猶如胎所纏遠離胎藏智無分別淳熟三地知諸垢如泥模所泥大智諸菩薩金剛定智斷萎華至泥模如是九種喻示貪瞋癡等九種煩惱垢垢中如來藏佛等相對法如是九種義以三種體攝此偈明何義謂依法身自性清淨心如來藏等三種實體有諸佛等九種譬喻相似相對法應知三種實體者偈言法身及真如如來性實體三種及一種五種喻示現此偈明何義初三種喻示現如來法身應知三種譬喻者所謂諸佛美蜜堅固示現法身偈言法身故一種譬喻者所謂真金示現真如偈言真如故又何等為五種譬喻一者地藏二者樹三者金像四者轉輪聖王五者寶像能生三種佛身示現如來性偈言如來性故又法身者偈言法身有二種清淨真法界及依彼習氣以深淺義説此偈明何義諸佛如來有二種法身何等為二一者寂靜法界身以無分別智境界故如是諸佛如來法身唯自內身法界能證應知偈言清淨真法界故二者為得彼因謂彼寂靜法界説法依可化衆生説彼説法應知以依真如法身有彼説法名為習氣偈言及依彼習氣故彼説法者復有二種一細二麁細者所謂為諸菩薩摩訶薩演説甚深祕密法藏以依第一義諦説故麁者所謂種種修多羅祇夜和伽羅那伽陀憂陀那尼陀那等名字章句種種差別以依世諦説故是故偈言以出世間法世中無譬喻是故依彼性還説性譬喻如美蜜一味微細法亦爾修多羅等説如種種異味此偈明何義諸佛美蜜及堅固等三種譬喻此明如來真如法身有二種義一者遍覆一切衆生二者遍身中有無有餘殘示現一切衆生有如來藏此以何義於衆生界中無有一衆生離如來法身在於法身外離於如來智在如來智外如種種色像不離虛空中是故偈言譬如諸色像不離於虛空如是衆生身不離諸佛智以如是義故説一切衆生皆有如來藏如虛空中色以性不改變體本來清淨如真金不變故説真如喻此偈明何義明彼真如如來之性乃至邪聚衆生身中自性清淨心無異無差別光明明了以離客塵諸煩惱故後時説言如來法身如是以一真金譬喻依真如無差別不離佛法身故説諸衆生皆有如來藏以自性清淨心雖言清淨而本來無二法故是故經中佛告文殊師利言文殊師利如來如實知見自身根本清淨智以依自身根本智故知諸衆生有清淨身文殊師利所謂如來自性清淨身乃至一切衆生自性清淨身此二法者無二無差別是故偈言一切諸衆生平等如來藏真如清淨法名為如來體依如是義故説一切衆生皆有如來藏應當如是知又復偈言佛性有二種一者如地藏二者如樹果無始世界來自性清淨心修行無上道依二種佛性得出三種身依初譬喻故知有初法身依第二譬喻知有二佛身真佛法身淨猶如真金像以性不改變攝功德實體證大法王位如轉輪聖王依止鏡像體有化佛像現此偈明何義餘五種譬喻所謂藏樹金像轉輪聖王寶像譬喻示現生彼三佛法身以依自體性如來之性諸衆生藏是故説言一切衆生有如來藏此示何義以諸佛如來有三種身得名義故此五種喻能作三種佛法身因以是義故説如來性因此以何義此中明性義以為因義以是義故經中偈言無始世來性作諸法依止依性有諸道及證涅槃果此偈明何義無始世界性者如經説言諸佛如來依如來藏説諸衆生無始本際不可得知故所言性者如聖者勝鬘經言世尊如來説如來藏者是法界藏出世間法身藏出世間上上藏自性清淨法身藏自性清淨如來藏故作諸法依止者如聖者勝鬘經言世尊是故如來藏是依是持是住持是建立世尊不離不離智不斷不脫不異無為不思議佛法世尊亦有斷脫異外離離智有為法亦依亦持亦住持亦建立依如來藏故依性有諸道者如聖者勝鬘經言世尊生死者依如來藏世尊有如來藏故説生死是名善説故及證涅槃果者如聖者勝鬘經言世尊依如來藏故有生死依如來藏故證涅槃世尊若無如來藏者不得厭苦樂求涅槃不欲涅槃不願涅槃故此明何義明如來藏究竟如來法身不差別真如體相畢竟定佛性體於一切時一切衆生身中皆無餘盡應知此云何知依法相知是故經言善男子此法性法體性自性常住如來出世若不出世自性清淨本來常住一切衆生有如來藏此明何義依法性依法體依法相應依法方便此法為如是為不如是不可思議一切處依法依法量依法信得心淨得心定彼不可分別為實為不實唯依如來信是故偈言唯依如來信信於第一義如無眼目者不能見日輪此偈明何義略説一切衆生界中有四種衆生不識如來藏如生盲人何等為四一者凡夫二者聲聞三者辟支佛四者初發菩提心菩薩如聖者勝鬘經中説言世尊如來藏者於身見衆生非其境界世尊如來藏者於取四顛倒衆生非其境界世尊如來藏者於散亂心失空衆生非其境界故此明何義身見衆生者謂諸凡夫以彼凡夫實無色等五陰諸法而取以為有我我所虛妄執著我我所慢於離身見等滅諦無漏性甘露之法信亦不能何況出世間一切智境界如來藏能證能解無有是處又取四顛倒諸衆生者所謂聲聞辟支佛人以彼聲聞辟支佛等應修行如來藏常而不修行如來藏以為常以顛倒取一切法無常修行如來藏無常樂無常修行以不知不覺故應修行如來藏樂而不修行如來藏以為樂以顛倒取一切法皆苦修行如來藏苦樂苦修行以不知不覺故應修行如來藏我而不修行如來藏以為我以顛倒取一切法無我修行如來藏無我樂無我修行以不知不覺故應修行如來藏淨而不修行如來藏以為淨以顛倒取一切法不淨修行如來藏不淨樂不淨修行以不知不覺故如是聲聞辟支佛等一切不能如實隨順法身修行以是義故第一彼岸常樂我淨法非彼聲聞辟支佛等所知境界如是樂顛倒無常苦無我不淨相等彼如來藏非其境界如是之義大般涅槃修多羅中池水譬喻廣明此義應知彼經中言迦葉譬如春時有諸人等在大池浴乘船遊戲失琉璃寶沒深水中是時諸人悉共入水求覓是寶競捉瓦石草木沙礫各各自謂得琉璃珠歡喜持出乃知非真是時寶珠猶在水中以珠力故水皆澄清於是大衆乃見寶珠故在水下猶如仰觀虛空月形是時衆中有一智人以方便力安徐入水即便得珠汝等比丘不應如是修集無常苦無我想不淨想等以為真實如彼諸人各以瓦石草木沙礫而為寶珠汝等應當善學方便在在處處常修我想常樂淨想復應當知先所修集四法相貌悉是顛倒欲得真實修諸想者如彼智人巧出寶珠所謂我想常樂淨想故又散亂心失空衆生者謂初發心菩薩離空如來藏義以失變壞物修行名為空解脫門此以何義初發心菩薩起如是心實有法斷滅後時得涅槃如是菩薩失空如來藏修行又復有人以空為有物我應得空又生如是心離色等法別更有空我應修行令得彼空彼人不知空以何等法是如來藏偈言不空如來藏謂無上佛法不相捨離相不增減一法如來無為身自性本來淨客塵虛妄染本來自性空此偈明何義不減一法者不減煩惱不增一法者真如性中不增一法以不捨離清淨體故偈言不相捨離相不增減一法故是故聖者勝鬘經言世尊有二種如來藏空智世尊空如來藏若離若脫若異一切煩惱藏世尊不空如來藏過於恆沙不離不脫不異不思議佛法故如是以何等煩惱以何等處無如是如實見知名為空智又何等諸佛法何處具足有如是如實見知名不空智如是明離有無二邊如實知空相此二偈中明如是義又衆生若離如是空智彼人則是佛境界外名不相應不得定不得一心以是義故名散亂心失空衆生何以故以離第一義空智門無分別境界不可得證不可得見是故聖者勝鬘經言世尊如來藏智名為空智世尊如來藏空智者一切聲聞辟支佛等本所不見本所不得本所不證本所不會世尊一切苦滅唯佛得證壞一切煩惱藏修一切滅苦道故如是此如來藏以法界藏故身見等衆生不能得見已説以身見相對治真實法界未現前故又如是出世間法身如來藏非顛倒衆生境界已説以無常等世間法對治出世間法界未現前故又如是自性清淨法界如來空藏非散亂心失空衆生境界已説以煩惱垢客塵染空自性清淨功德法不相捨離出世間法身得名故此明何義又依一味等味法界無差別智門觀察出世間自性清淨法身是名如實知見真如是故經説十住菩薩唯能少分見如來藏何況凡夫二乘人等是故偈言譬如薄雲中見虛空有日淨慧諸聖人見佛亦如是聲聞辟支佛如無眼目者不能觀如來如盲不見日所知一切法有無量無邊遍虛空法界無量智能見諸如來法身充滿一切處佛智慧能見以無量智故究竟一乘寶性論為何義説品第七問曰真如佛性如來藏義住無障閡究竟菩薩地菩薩第一聖人亦非境界以是一切智者境界故若如是者何故乃為愚癡顛倒凡夫人説答曰以是義故略説四偈處處經中説內外一切空有為法如雲及如夢幻等此中何故説一切諸衆生皆有如來性而不説空寂以有怯弱心輕慢諸衆生執著虛妄法謗真如佛性計身有神我為令如是等遠離五種過故説有佛性此四行偈以十一偈略釋應知偈言諸修多羅中説有為諸法謂煩惱業等如雲等虛妄煩惱猶如雲所作業如夢如幻陰亦爾煩惱業生故先已如是説此究竟論中為離五種過説有真如性以衆生不聞不發菩提心或有怯弱心欺自身諸過未發菩提心生起欺慢意見發菩提心我勝彼菩薩如是憍慢人不起正智心是故虛妄取不知如實法妄取衆生過不知客染心實無彼諸過自性淨功德以取虛妄過不知實功德是故不得生自他平等慈聞彼真如性起大勇猛力及恭敬世尊智慧及大悲生增長五法不退轉平等無一切諸過唯有諸功德取一切衆生如我身無異速疾得成就無上佛菩提究竟一乘寶性論身轉清淨成菩提品第八論曰已説有垢如自此以下説無垢如應知無垢如者謂諸佛如來於無漏法界中遠離一切種種諸垢轉雜穢身得淨妙身依八句義略差別説彼真如性無漏法身應知何等為八偈言淨得及遠離自他利相應依止深快大時數如彼法是名八種句義次第一偈示現八種義者何謂八種一者實體二者因三者果四者業五者相應六者行七者常八者不可思議實體者向説如來藏不離煩惱藏所纏以遠離諸煩惱轉身得清淨是名為實體應知偈言淨故是故聖者勝鬘經言世尊若於無量煩惱藏所纏如來藏不疑惑者於出無量煩惱藏法身亦無疑惑故因者有二種無分別智一者出世間無分別智二者依出世間智得世間出世間依止行智是名為因偈言得故果者即依此得得證智果是名為果偈言遠離故業者有二種遠離一者遠離煩惱障二者遠離智障如是次第故名遠離如是遠離自利利他成就是名為業偈言自他利故相應者自利利他得無量功德常畢竟住持是名相應偈言相應故行常不思議者謂三種佛法身無始世界來作衆生利益常不休息不可思議偈言依止深快大故以是義故略説偈言實體因果業及以相應行常不可思議名佛地應知又依實體依因於佛地中及得彼方便因故説三偈向説佛法身自性清淨體為諸煩惱垢客塵所染污譬如虛空中離垢淨日月為彼厚密雲羅網之所覆佛功德無垢常恆及不變不分別諸法得無漏真智此三行偈以四行偈略釋應知偈言佛身不捨離清淨真妙法如虛空日月智離染不二過恆沙佛法明淨諸功德非作法相應不離彼實體煩惱及智障彼法實無體常為客塵染是故説雲喻遠離彼二因向二無分別無分別真智及依彼所得此偈明何義向説轉身實體清淨又清淨者略有二種何等為二一者自性清淨二者離垢清淨自性清淨者謂性解脫無所捨離以彼自性清淨心體不捨一切客塵煩惱以彼本來不相應故離垢清淨者謂得解脫又彼解脫不離一切法如水不離諸塵垢等而言清淨以自性清淨心遠離客塵諸煩惱垢更無餘故又依彼果離垢清淨故説四偈如清淨池水無有諸塵濁種種雜花樹周匝常圍繞如月離羅睺日無雲翳等無垢功德具顯現即彼體蜂王美味蜜堅實淨真金寶藏大果樹無垢真金像轉輪聖王身妙寶如來像如是等諸法即是如來身此四行偈以八行偈略釋應知偈言貪等客煩惱猶如濁水塵無分別上智果法如池水示現佛法身一切諸功德依彼證智果是故如是説貪如濁水塵淨法離垢染可化諸衆生如繞池藕花禪定習氣潤遠離瞋羅睺以大慈悲水遍益諸衆生如十五日月遠離雲羅網光明照衆生能除諸幽暗佛無垢日月離癡雲羅網智光照衆生除滅諸黑暗得無等等法能與妙法味諸佛如蜜堅遠離蜂糩障真實妙功德除斷諸貧窮能與解脫勢故説金樹喻法寶真實身增上兩足尊勝色畢竟成故説後三喻又向説以二種智依自利利他業何者為二一者出世間無分別智二者依出世間無分別智轉身得身行因遠離煩惱得證智果故又何者是成就自利謂得解脫遠離煩惱障遠離智障得無障礙清淨法身是名成就自身利益又何者是成就他利益既得成就自身利已無始世來自然依彼二種佛身示現世間自在力行是名成就他身利益又依自利利他成就業義故説四偈無漏及遍至不滅法與恆清涼不變異不退寂靜處諸佛如來身如虛空無相為諸勝智者作六根境界示現微妙色出於妙音聲令嗅佛戒香與佛妙法味使覺三昧觸令知深妙法細思惟稠林佛離虛空相此四行偈以八行偈略釋應知偈言略説二種法業智應當知滿足解脫身清淨真法身解脫身法身二及一應知謂無漏遍至及究竟無為煩惱盡無漏及習氣滅故無閡及無障智遍至應知無為以不滅實體不失故不失名為本恆等句解釋對於恆等句有四失應知死無常及轉不可思議退以無死故恆以常故清涼不轉故不變寂靜故不退彼究竟足迹淨智白法體具足色聲等示現於諸根如虛空無相而現色等相法身亦如是具六根境界此偈明何義經中説言如虛空相諸佛亦爾者此依第一義諸佛如來清淨法身自體相不共法故作如是説以是義故金剛般若波羅蜜經言須菩提於意云何可以三十二大人相成就得見如來不須菩提言如我解佛所説義者不以相成就得見如來佛言如是如是須菩提不以相成就得見如來須菩提若以相成就觀如來者轉輪聖王應是如來是故非以相成就得見如來故此明何義以依如來第一義諦清淨法身明如是義又依相應義故説二偈如空不思議常恆及清涼不變與寂靜遍離諸分別一切處不著離閡麁澀觸亦不可見取佛淨心無垢此二行偈以八行偈略釋應知偈言解脫身法身示自利利他依自利利他彼處相應義一切諸功德不思議應知以非三慧境一切種智知諸衆生佛體細故非聞境第一非思思以出世深密世修慧不知諸愚癡凡夫本來未曾見如盲不矚色二乘如嬰兒不見日月輪以不生故常以不滅故恆離二故清涼法性住不變證滅故寂靜一切覺故遍不住不分別離煩惱不著無智障離閡柔軟離麁澀無色不可見離相不可取以自性故淨離染故無垢此偈明何義虛空譬喻者明諸佛如來無為諸功德不離佛法身於所有諸有得不可思議勝大方便業勝大悲業勝大智業為與一切衆生樂相無垢清淨三種佛身所謂實佛受法樂佛及化身佛常不休息常不斷絶自然修行以為利益一切衆生應知以不共餘人唯諸佛如來法身相應故此明何義以依此身相應諸行差別故説八偈非初非中後不破壞不二遠離於三界無垢無分別此甚深境界非二乘所知具勝三昧慧如是人能見出過於恆沙不思議功德唯如來成就不與餘人共如來妙色身清淨無垢體遠離諸煩惱及一切習氣種種勝妙法光明以為體令衆生解脫常無有休息所作不思議如摩尼寶王能現種種形而彼體非實為世間説法示現寂靜處教化使淳熟授記令入道如來鏡像身而不離本體猶如一切色不離於虛空此八行偈以二十五偈略釋應知偈言向説佛法身及一切種智自在與涅槃及第一義諦不可思議法應供等功德唯自身內證應當如是知彼三身差別實法報化等所謂深快大無量功德身明實體身者謂諸佛法身略説五種相五功德應知無為無差別遠離於二邊出離煩惱障智障三昧障以離一切垢故聖人境界清淨光明照以法性如是無量阿僧祇不可數思議無等諸功德到第一彼岸實法身相應以快不可數非思量境界及遠離習氣無邊等佛法次第不離報受種種法味示現諸妙色淨慈悲習氣無虛妄分別利益諸衆生自然無休息如如意寶珠滿足衆生心受樂佛如是神通力自在此神力自在略説有五種説法及可見諸業不休息及休息隱沒示現不實體是名要略説有五種自在如摩尼寶珠依種種諸色異本生諸相一切皆不實如來亦如是方便力示現從兜率陀退次第入胎生習學諸伎藝嬰兒入王宮厭離諸欲相出家行苦行推問諸外道往詣於道場降伏諸魔衆成大妙覺尊轉無上法輪入無餘涅槃於不清淨國現如是等事世間無休息宣説無常苦無我寂靜名方便智慧力令彼諸衆生厭離三界苦後入於涅槃以入寂靜道諸聲聞人等有是虛妄相言我得涅槃法華等諸經皆説如實法般若方便攝回先虛妄心令淳熟上乘授妙菩提記微細大勢力令愚癡衆生過嶮難惡道深快及以大次第説應知初法身如來第二色身佛譬如虛空中有一切色身於初佛身中最後身亦爾自此以下即依如是三種佛身為樂衆生利益衆生略説二偈世尊體常住以修無量因衆生界不盡慈悲心如意智成就相應法中得自在降伏諸魔怨體寂靜故常此二行偈以六行偈略釋應知偈言棄捨身命財攝取諸佛法為利益衆生究竟滿本願得清淨佛身起大慈悲心修行四如意依彼力住世以成就妙智離有涅槃心常得心三昧成就樂相應常在於世間不為世法染得淨甘露處故離一切魔諸佛本不生本來寂靜故以常可歸依故言歸依我初七種譬喻如來色身常後三種譬喻善逝法身常此偈明何義諸佛如來依法身轉得無上身不可思議應知依不可思議故説二偈非言語所説第一義諦攝離諸覺觀地無譬喻可説最上勝妙法不取有涅槃非三乘所知唯是佛境界此二行偈以五行偈略釋應知偈言不可得思議以離言語相離言語相者以第一義攝第一義攝者非思量境界非思量境者以無譬喻知無譬喻知者以最勝無上最勝無上者不取有涅槃不取是二者不取功德過前五種譬喻微細不思議如來法身常第六譬喻者以得自在故如來色身常究竟一乘寶性論如來功德品第九論曰已説無垢真如法身次説依彼無垢真如法身一切功德如摩尼寶不離光明形色諸相如來法身無量無邊自性清淨無垢功德亦復如是以是義故依佛功德次説二偈自利亦利他第一義諦身依彼真諦身有此世諦體果遠離淳熟此中具足有六十四種法諸功德差別此偈示現何義偈言於自身成就住持諸佛法故攝第一身為他身住持諸如來世尊故有世諦體佛無量功德初身攝應知十力四無畏大丈夫相等彼受樂報體第二佛身攝此偈明何義明十力等六十四種佛身功德此云何知依彼義故略説二偈佛力金剛杵破無智者障如來無所畏處衆如師子如來不共法清淨如虛空如彼水中月衆生二種見自此已下功德品中餘殘論偈依此二偈次第示現彼十力等六十四種如來功德如陀羅尼自在王經廣説應知初依十力故説二偈處非處果報業及於諸根性信至處道離垢諸禪定憶念過去世天眼寂靜智如是等諸句説十種力名又依四無畏故説三偈如實覺諸法遮諸閡道障説道得無漏是四種無畏於所知境界畢竟知自他自知教他知此非遮障道能證勝妙果自得令他得説自他利諦是諸處無畏又依十八不共佛法故説八偈佛無過無諍無妄念等失無不定散心無種種諸想無作意護心欲精進不退念慧及解脫知見等不退諸業智為本知三世無障佛十八功德及餘不説者佛身口無失若他來破壞內心無動相非作心捨心世尊欲精進念淨智解脫知見常不失示現可知境一切諸業等智為本展轉三世無障閡廣大智行常是名如來體大智慧相應覺彼大菩提最上勝妙法為一切衆生轉於大法輪無畏勝妙法令彼得解脫又依三十二大人相故説十一偈足下相平滿具足千輻輪跟傭趺上隆伊尼鹿王手足悉柔軟諸指皆纖長鵝王網縵指臂肘上下傭兩肩前後平左右俱圓滿立能手過膝馬王陰藏相身傭相洪雅如尼拘樹王體相七處滿上半如師子威德勢堅固猶如那羅延身色新淨妙柔軟金色皮淨軟細平密一孔一毛生毛柔軟上靡微細輪右旋身淨光圓匝頂上相高顯項如孔雀王頤方若師子髮淨金精色喻如因陀羅額上白毫相通面淨光明口含四十齒二牙白踰雪深密內外明上下齒平齊迦陵頻伽聲妙音深遠聲所食至喉現得味中上味細薄廣長舌二目淳紺色瞬眼若牛王功德如蓮華如是説人尊妙相三十二一一不雜亂普身不可嫌此佛十力四無所畏十八不共法三十二大人相略集一處是名六十四種功德應知偈言六十四功德修因及果報一一各差別寶經次第説此偈明何義向説諸佛如來六十四種功德因果差別依此次第寶女經中廣説應知又復依此四處次第有四種喻謂金剛杵及師子王虛空譬喻水中月等有九行偈依彼九偈略説偈言衝過無慈心不共他無心故説杵師子空水中月喻又依十力金剛杵喻故説二偈處非處果性衆生諸信根種種道修地過宿命差別天眼漏盡等佛力金剛杵能刺碎散斫癡鎧山牆樹此偈示現何義略説偈言諸如來六力次第三及一所知境界中離三昧諸障及離餘垢障譬如破散截鎧牆及樹等亦重亦堅固亦不可破壞如來十種力猶如彼金剛故説金剛杵又依四無畏師子王喻故説二偈譬如師子王諸獸中自在常處於山林不怖畏諸獸佛人王亦爾處於諸群衆不畏及善住堅固奮迅等此偈示現何義略説偈言知病苦知因遠離彼苦因説聖道妙藥為離病證滅遠離諸怖畏善住奮迅城佛王在大衆無畏如師子以知一切法是故能善住一切處不畏離愚癡凡夫二乘及清淨以見我無等於一切法中心常定堅固何故名奮迅過無明住地自在無閡處是故名奮迅又依十八不共法虛空譬喻故説三偈地水火風等彼法空中無諸色中亦無虛空無閡法諸佛無障礙猶如虛空相如來在世間如地水火風而諸佛如來所有諸功德乃至無一法共餘世間有此偈示現何義略説偈言聲聞及空行智者及自在上上微細法故示現五大諸衆生受用如地水火風離世離出世故説虛空大三十二功德依止法身有如世間燈炷明暖及色相相應無差別諸如來法身一切諸功德無差別亦爾又依三十二大丈夫相水中月喻故説二偈秋空無雲曀月在天及水一切世間人皆見月勢力清淨佛輪中具功德勢力佛子見如來功德身亦爾此偈示現何義略説偈言三十二功德見者生歡喜依法報化身三種佛而有法身淨無垢遠離於世間在如來輪中衆生見二處如清淨水中見於月影像是三十二相依色身得名如摩尼寶珠不離光色相色身亦如是不離三十二究竟一乘寶性論自然不休息佛業品第十論曰已説無垢諸佛功德次説諸佛如來作業彼諸佛業自然而行常不休息教化衆生應知此依略説有二種法自然而行以是義故依諸佛業自然而行常不休息常作佛事故説六偈於可化衆生以教化方便起化衆生業教化衆生界諸佛自在人於可化衆生常待處待時自然作佛事遍覺知大乘最妙功德聚如大海水寶如來智亦爾菩提廣無邊猶如虛空界於無量功德大智慧日光遍照諸衆生有佛妙法身無垢功德藏如我身無異煩惱障智障雲霧羅網覆諸佛慈悲風吹令散滅盡此六行偈義以十四偈略釋應知偈言以何等性智何者何處時作業無分別是故業自然以何等根性諸衆生可度以何等智慧能度諸衆生又以何者是化衆生方便衆生以何處何時中可化進趣及功德為果為攝取彼障及斷障諸緣不分別進趣謂十地功德因二諦果謂大菩提攝菩提眷屬彼障謂無邊煩惱及習氣斷障謂大慈及大悲心等是名一切時常種種因緣如是等六處次第説應知如大海水寶空日地雲風諸地如大海智水功德寶菩提如空界廣無中後邊為利益衆生二種業如日能悉遍照知一切衆生界皆有如來性如地中伏藏猶如彼大地體安固不動為利益衆生見彼我無別客塵煩惱等本自無體性一切皆虛妄如雲聚不實起大慈悲心猶如猛風吹煩惱智障盡如彼雲聚散化事未究竟故常在世間從本際以來自然不休息問曰如向所説諸佛如來不生不滅若如是者即無為法無為法者不修行業云何自然不休息常教化衆生事答曰為示現彼諸佛大事斷諸疑惑是故依彼不可思議無垢清淨諸佛境界示現大事故以譬喻説一行偈帝釋妙鼓雲梵天日摩尼響及虛空地如來身亦爾依此一行修多羅攝取義偈九種譬喻自此以下廣説餘殘六十六偈應知又復依彼廣説偈義九種譬喻略説彼義及以次第廣説如來無上利益一切衆生修行究竟以十九偈解釋應知偈言遠離一切業未曾見有果為一切疑人除諸疑網故説九種譬喻彼修多羅名廣説此諸法彼修多羅中廣説九種喻彼名智境界快妙智莊嚴有智者速入具足佛境界説彼天帝釋琉璃鏡像等九種諸譬喻應知彼要義見説及遍至以離諸相智身口意業密大慈悲者得離諸功用心無分別寂靜以智故無垢如大毗琉璃帝釋等譬喻智究竟滿足故究竟寂靜以有淨智慧是故無分別為成種種義故説釋等喻為成彼義者説九種見等離生離神通諸佛現是事是名為略説種種義譬喻先喻解異後後喻解異前佛體如鏡像如彼琉璃地人非不有聲如天妙法鼓非不作法事如彼大雲雨非不作利益而亦非不生種種諸種子如梵天不動而非不淳熟如彼大日輪非不破諸暗如彼如意寶而非不希有猶如彼聲響非不因緣成猶如彼虛空非不為一切衆生作依止猶如彼大地而非不住持一切種種物以依彼大地荷負諸世間種種諸物故依諸佛菩提出世間妙法成就諸白業諸禪四無量及以四空定諸如來自然常住諸世間有如是諸業一時非前後作如是妙業究竟一乘寶性論挍量信功德品第十一論曰向説四種法自此已下明有慧人於彼法中能生信心依彼信者所得功德説十四偈佛性佛菩提佛法及佛業諸出世淨人所不能思議此諸佛境界若有能信者得無量功德勝一切衆生以求佛菩提不思議果報得無量功德故勝諸世間若有人能捨摩尼珠珍寶遍布十方界無量佛國土為求佛菩提施與諸法王是人如是施無量恆沙劫若復有人聞妙境界一句聞已復能信過施福無量若有智慧人奉持無上戒身口意業淨自然常護持為求佛菩提如是無量劫是人所得福不可得思議若復有人聞妙境界一句聞已復能信過戒福無量若人入禪定焚三界煩惱過天行彼岸無菩提方便若復有人聞妙境界一句聞已復能信過禪福無量無慧人能捨唯得富貴報修持禁戒者得生人天中修行斷諸障非慧不能除慧除煩惱障亦能除智障聞法為慧因是故聞法勝何況聞法已復能生信心此十四偈以十一偈略釋應知偈言身及彼所轉功德及成義示此四種法唯如來境界智者信為有及信畢竟得以信諸功德速證無上道究竟到彼岸如來所住處信有彼境界彼非可思議我等可得彼彼功德如是唯深信勝智欲精進念定修智等功德無上菩提心一切常現前以常現前故名不退佛子彼岸淨功德畢竟能成就五度是功德以不分別三畢竟及清淨以離對治法施唯施功德持戒唯持戒餘二度修行謂忍辱禪定精進遍諸處慳等所治法名為煩惱障虛分別三法是名為智障遠離彼諸障更無餘勝因唯真妙智慧是故般若勝彼智慧根本所謂聞慧是以聞慧生智是故聞為勝又自此已下明向所説義依何等法説依何等義説依何等相説初依彼法故説二偈我此所説法為自心清淨依諸如來教修多羅相應若有智慧人聞能信受者我此所説法亦為攝彼人自此已下次依彼義故説二偈依燈電摩尼日月等諸明一切有眼者皆能見境界依佛法光明慧眼者能見以法有是利故我説此法自此已下次依彼相故説二偈若一切所説有義有法句能令修行者遠離於三界及示寂靜法最勝無上道佛説是正經餘者顛倒説自此已下依護法方便故説七偈雖説法句義斷三界煩惱無明覆慧眼貪等垢所纏又於佛法中取少分説者世典善言説彼三尚可受何況諸如來遠離煩惱垢無漏智慧人所説修多羅以離於諸佛一切世間中更無勝智慧如實知法者如來説了義彼不可思議思者是謗法不識佛意故謗聖及壞法此諸邪思惟煩惱愚癡人妄見所計故故不應執著邪見諸垢法以淨衣受色垢膩不可染自此已下依謗正法故説三偈愚不信白法邪見及憍慢過去謗法障執著不了義著供養恭敬唯見於邪法遠離善知識親近謗法者樂著小乘法如是等衆生不信於大乘故謗諸佛法自此已下依謗正法得惡果報故説六偈智者不應畏怨家蛇火毒因陀羅霹靂刀杖諸惡獸師子虎狼等彼但能斷命不能令人入可畏阿鼻獄應畏謗深法及謗法知識決定令人入可畏阿鼻獄雖近惡知識惡心出佛血及殺害父母斷諸聖人命破壞和合僧及斷諸善根以繫念正法能解脫彼處若復有餘人誹謗甚深法彼人無量劫不可得解脫自此已下依於説法法師生敬重心故説二偈若人令衆生學信如是法彼是我父母亦是善知識彼人是智者以如來滅後回邪見顛倒令入正道故自此已下依彼説法所得功德以用回向故説三偈三寶清淨性菩提功德業我略説七種與佛經相應依此諸功德願於命終時見無量壽佛無邊功德身我及餘信者既見彼佛已願得離垢眼成無上菩提自此已下略説句義偈言依何等法説依何等義説依何等相説如彼法而説如彼義而説如彼相而説彼一切諸法六行偈示現護自身方便以七行偈説明誹謗正法故有三行偈六偈示彼因以二偈示現於彼説法人深生敬重心大衆聞忍受得彼大菩提略説三種法示現彼果報
